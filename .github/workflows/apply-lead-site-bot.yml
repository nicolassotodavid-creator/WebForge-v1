name: Aplicar 0022 site_has_bot (manual)

# Aplica la migración 0022 a la BD de PRODUCCIÓN vía la Management API: añade la columna
# leads.site_has_bot + índice parcial + backfill desde site_analysis._widgets.vendors.
# Hace falta porque deploy.yml SOLO despliega funciones, NO aplica migraciones → sin esto,
# analyze-site/score-sites petan al escribir site_has_bot y el pitch Luvia por estado sale
# siempre "unknown". Idempotente: add column if not exists + create index if not exists, y el
# backfill es un update re-ejecutable. Botón: Actions → "Aplicar 0022 site_has_bot" → Run workflow.

on:
  workflow_dispatch: {}

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Aplicar migración 0022 (site_has_bot)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: khscikqchvjxyvoaruas
        run: |
          set -euo pipefail
          Q="https://api.supabase.com/v1/projects/$PROJECT_REF/database/query"
          post()      { curl -sS -X POST "$Q" -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" -H "Content-Type: application/json" --data @-; echo; }
          post_sql()  { jq -n --arg q "$1" '{query:$q}' | post; }
          post_file() { jq -Rs '{query:.}' < "$1" | post; }

          echo "== 1) aplicar 0022 (columna + índice + backfill) =="
          post_file supabase/migrations/0022_lead_site_bot.sql

          echo "== 2) verificar: columna presente + conteo por valor =="
          post_sql "select column_name, data_type from information_schema.columns where table_name = 'leads' and column_name = 'site_has_bot'"
          post_sql "select site_has_bot, count(*) from leads group by site_has_bot order by 1 nulls last"

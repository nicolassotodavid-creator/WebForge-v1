name: Aplicar cron-briefs (pg_cron, manual)

# Programa (o re-programa) el job pg_cron 'cron-briefs' y lo dispara una vez ahora.
# Ejecuta el SQL contra la BD vía la Management API de Supabase, usando SUPABASE_ACCESS_TOKEN
# (ya existente). No expone la service key: pg_cron la lee del Vault dentro de la propia BD.
# Botón: Actions → "Aplicar cron-briefs" → Run workflow. Recurrente lo hace pg_cron; esto es
# para aplicarlo/lanzarlo a demanda.

on:
  workflow_dispatch: {}

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Programar pg_cron y disparar una vez
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: khscikqchvjxyvoaruas
        run: |
          set -euo pipefail
          Q="https://api.supabase.com/v1/projects/$PROJECT_REF/database/query"
          post()      { curl -sS -X POST "$Q" -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" -H "Content-Type: application/json" --data @-; echo; }
          post_sql()  { jq -n --arg q "$1" '{query:$q}' | post; }
          post_file() { jq -Rs '{query:.}' < "$1" | post; }

          echo "== 1) ¿existe el secreto del Vault? (debe devolver 'service_role_key') =="
          post_sql "select name from vault.secrets where name = 'service_role_key'"

          echo "== 2) aplicar el schedule (migración 0018) =="
          post_file supabase/migrations/0018_cron_briefs.sql

          echo "== 3) verificar el job =="
          post_sql "select jobname, schedule, active from cron.job where jobname = 'cron-briefs'"

          echo "== 4) dispararlo una vez ahora =="
          cat > fire.sql <<'SQL'
          select net.http_post(
            url     := 'https://khscikqchvjxyvoaruas.supabase.co/functions/v1/cron-briefs',
            headers := jsonb_build_object(
              'Content-Type', 'application/json',
              'Authorization', 'Bearer ' ||
                (select decrypted_secret from vault.decrypted_secrets where name = 'service_role_key')
            ),
            body    := '{}'::jsonb,
            timeout_milliseconds := 90000
          ) as request_id;
          SQL
          post_file fire.sql

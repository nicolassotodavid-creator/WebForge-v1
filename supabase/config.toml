# Config mínima de Supabase CLI para WebForge.
# project_id es solo una etiqueta local; el proyecto real se enlaza con `supabase link`.
project_id = "webforge"

# ingest-leads se llama desde el panel (con tu sesión) y desde el webhook del scraper
# (con la cabecera x-ingest-secret). La autorización la hace la propia función, así que
# desactivamos la verificación de JWT de la pasarela para permitir el webhook.
[functions.ingest-leads]
verify_jwt = false

# analyze-lead se llama desde el panel con tu sesión; la función valida el usuario por su cuenta.
[functions.analyze-lead]
verify_jwt = false

# cron-followups la invoca pg_cron (net.http_post) con Authorization: Bearer <service_role_key>.
# La función exige que el token sea exactamente la service key, así que desactivamos el JWT de
# la pasarela y dejamos que la función haga su propia autorización (igual que ingest-leads).
[functions.cron-followups]
verify_jwt = false

# score-sites la invoca pg_cron (0012) y run-scrape, ambos con Authorization: Bearer
# <service_role_key>. Igual que cron-followups: la propia función exige que el token sea la
# service key, así que desactivamos el JWT de la pasarela.
[functions.score-sites]
verify_jwt = false

# cron-briefs la invoca GitHub Actions (.github/workflows/daily-brief.yml) con Authorization:
# Bearer <service_role_key>. Igual que cron-followups/score-sites: la función exige que el token
# sea la service key, así que desactivamos el JWT de la pasarela.
[functions.cron-briefs]
verify_jwt = false

# Funciones públicas: llamadas desde la landing /book sin sesión de usuario
[functions.get-booking-info]
verify_jwt = false

[functions.create-checkout]
verify_jwt = false

[functions.track-event]
verify_jwt = false

# stripe-webhook lo llama Stripe directamente (no el browser), sin JWT de Supabase: solo la
# cabecera Stripe-Signature. La propia función verifica esa firma (HMAC-SHA256), así que
# desactivamos el JWT de la pasarela; si no, Stripe recibiría 401 y el webhook nunca correría.
[functions.stripe-webhook]
verify_jwt = false

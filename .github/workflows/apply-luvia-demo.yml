name: Aplicar 0023 luvia_demo (manual)

# Aplica la migración 0023 a la BD de PRODUCCIÓN vía la Management API: añade las columnas
# leads.luvia_demo_id / leads.luvia_demo_url (demo de Luvia pre-extraída para el outreach).
# Hace falta porque deploy.yml SOLO despliega funciones, NO aplica migraciones → sin esto,
# prepare-luvia-demo peta al escribir las columnas. Idempotente: add column if not exists.
# Botón: Actions → "Aplicar 0023 luvia_demo" → Run workflow.

on:
  workflow_dispatch: {}

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Aplicar migración 0023 (luvia_demo)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: khscikqchvjxyvoaruas
        run: |
          set -euo pipefail
          Q="https://api.supabase.com/v1/projects/$PROJECT_REF/database/query"
          post()      { curl -sS -X POST "$Q" -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" -H "Content-Type: application/json" --data @-; echo; }
          post_file() { jq -Rs '{query:.}' < "$1" | post; }
          post_sql()  { jq -n --arg q "$1" '{query:$q}' | post; }

          echo "== 1) aplicar 0023 (columnas luvia_demo) =="
          post_file supabase/migrations/0023_lead_luvia_demo.sql

          echo "== 2) verificar: columnas presentes =="
          post_sql "select column_name, data_type from information_schema.columns where table_name = 'leads' and column_name in ('luvia_demo_id','luvia_demo_url') order by 1"

name: Deploy Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Auth dedicada de los crons (cron-briefs / cron-followups / score-sites). Desacopla la
      # autenticación de SUPABASE_SERVICE_ROLE_KEY (DEPRECATED e irreproducible tras la migración
      # de keys). GitHub enmascara el valor en los logs.
      - name: Fijar secreto CRON_SECRET
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          supabase secrets set CRON_SECRET="$CRON_SECRET" --project-ref khscikqchvjxyvoaruas

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy \
            get-booking-info \
            create-checkout \
            stripe-webhook \
            analyze-lead \
            analyze-site \
            score-sites \
            generate-outreach \
            send-email \
            cron-followups \
            cron-briefs \
            track-event \
            ingest-leads \
            run-scrape \
            --project-ref khscikqchvjxyvoaruas \
            --use-api

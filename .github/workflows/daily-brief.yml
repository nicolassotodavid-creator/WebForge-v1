name: Brief automático (leads new → analyzed)

# Dispara la Edge Function cron-briefs para generar los briefs de los leads 'new' SIN depender
# del Mac. Es el PASO 1 del Orquestador movido a la nube (ver docs/superpowers/specs/
# 2026-07-03-brief-cron-servidor-design.md). El build en Lovable sigue en local (fase 2 aparte).
#
# NO necesita ningún secreto nuevo: deriva la service_role key en tiempo de ejecución desde
# SUPABASE_ACCESS_TOKEN (que ya existe en el repo, lo usa el deploy) vía la Management API de
# Supabase. Así la service key nunca se guarda como secreto ni pasa por sitios de más.

on:
  schedule:
    # Cada 2 horas (UTC, best-effort). Los briefs no son tiempo real; ajusta a gusto.
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

# No solapar ejecuciones: si un tick sigue en marcha, el siguiente espera (no se cancela).
concurrency:
  group: cron-briefs
  cancel-in-progress: false

jobs:
  briefs:
    runs-on: ubuntu-latest
    steps:
      - name: Generar briefs (deriva la service key y drena la cola de leads 'new')
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: khscikqchvjxyvoaruas
          FUNCTION_URL: https://khscikqchvjxyvoaruas.supabase.co/functions/v1/cron-briefs
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Falta el secreto SUPABASE_ACCESS_TOKEN en el repo."
            exit 1
          fi

          # ── Derivar la service_role key desde el access token (Management API) ────────────
          keyresp=$(curl -sS -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/api-keys?reveal=true")
          SERVICE_KEY=$(echo "$keyresp" | jq -r '.[]? | select(.name=="service_role") | (.api_key // .secret // .value // empty)')
          if [ -z "${SERVICE_KEY:-}" ] || [ "$SERVICE_KEY" = "null" ]; then
            # No imprimimos la respuesta cruda (contiene claves); solo los nombres, para depurar.
            echo "::error::No pude derivar la service_role key. Nombres recibidos: $(echo "$keyresp" | jq -rc '[.[]?.name]' 2>/dev/null || echo '??')"
            exit 1
          fi
          echo "::add-mask::$SERVICE_KEY"
          echo "✓ service key derivada"

          # ── Drenar la cola: llamar hasta que un tick no procese nada, con tope de seguridad ─
          total=0
          for i in $(seq 1 40); do
            resp=$(curl -sS -X POST "$FUNCTION_URL" \
              -H "Authorization: Bearer $SERVICE_KEY" \
              -H "Content-Type: application/json" \
              --max-time 150)
            echo "tick $i → $resp"

            processed=$(echo "$resp" | jq -r '.processed // empty')
            if ! [[ "$processed" =~ ^[0-9]+$ ]]; then
              echo "::error::Respuesta inesperada de cron-briefs: $resp"
              exit 1
            fi

            total=$((total + processed))
            [ "$processed" -eq 0 ] && break
          done

          echo "Briefs generados en esta ejecución: $total"

name: Aplicar migración BAJA/do_not_contact (0020, manual)

# Aplica la migración 0020 (leads.do_not_contact + unsubscribed_at) al Postgres de prod vía la
# Management API con SUPABASE_ACCESS_TOKEN (ya existente). Idempotente: la migración usa
# "add column if not exists". NO envía ningún email — solo altera el esquema y verifica.
# DEBE correrse ANTES de desplegar las edge functions: send-email/cron-followups seleccionan
# la columna do_not_contact y darían error si aún no existe.
# Botón: Actions → "Aplicar migración BAJA/do_not_contact" → Run workflow.

on:
  workflow_dispatch: {}

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Aplicar 0020 + verificar columnas
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: khscikqchvjxyvoaruas
        run: |
          set -euo pipefail
          Q="https://api.supabase.com/v1/projects/$PROJECT_REF/database/query"
          post()      { curl -sS -X POST "$Q" -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" -H "Content-Type: application/json" --data @-; echo; }
          post_sql()  { jq -n --arg q "$1" '{query:$q}' | post; }
          post_file() { jq -Rs '{query:.}' < "$1" | post; }

          echo "== 1) aplicar migración 0020 (idempotente) =="
          post_file supabase/migrations/0020_lead_do_not_contact.sql

          echo "== 2) verificar que las columnas existen =="
          post_sql "select column_name, data_type, column_default from information_schema.columns where table_name = 'leads' and column_name in ('do_not_contact','unsubscribed_at') order by column_name"

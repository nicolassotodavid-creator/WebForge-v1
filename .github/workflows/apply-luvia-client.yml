name: Aplicar migración Luvia client (0021, manual)

# Aplica la migración 0021 (leads.luvia_client_id) al Postgres de prod vía la Management API
# con SUPABASE_ACCESS_TOKEN (ya existente). Idempotente: usa "add column if not exists". NO envía
# ningún email — solo altera el esquema y verifica.
# DEBE correrse ANTES de desplegar la función handoff-luvia: la función selecciona/actualiza
# luvia_client_id y daría error si la columna aún no existe.
# Botón: Actions → "Aplicar migración Luvia client (0021, manual)" → Run workflow.

on:
  workflow_dispatch: {}

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Aplicar 0021 + verificar columna
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: khscikqchvjxyvoaruas
        run: |
          set -euo pipefail
          Q="https://api.supabase.com/v1/projects/$PROJECT_REF/database/query"
          post()      { curl -sS -X POST "$Q" -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" -H "Content-Type: application/json" --data @-; echo; }
          post_sql()  { jq -n --arg q "$1" '{query:$q}' | post; }
          post_file() { jq -Rs '{query:.}' < "$1" | post; }

          echo "== 1) aplicar migración 0021 (idempotente) =="
          post_file supabase/migrations/0021_lead_luvia_client.sql

          echo "== 2) verificar que la columna existe =="
          post_sql "select column_name, data_type from information_schema.columns where table_name = 'leads' and column_name = 'luvia_client_id'"

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16151c" />
    <title>WebForge · Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Tema dark-first del panel, aplicado antes de pintar (sin FOUC).
      // Las páginas públicas de cliente (/book, /gracias) se quedan en claro.
      (function () {
        try {
          var p = location.pathname;
          if (p.indexOf("/book") === 0 || p.indexOf("/gracias") === 0) return;
          var saved = localStorage.getItem("theme");
          var dark = saved ? saved === "dark" : true;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
